name: Python CI

# Triger the workflow on any push to the main branch or pull request
on:
  push:  <--- Event
    branches:
     - main  ## Events Pull, Push, Merge, Delete ---> Trigger Workflow
  pull_request:
    branches:
     - main

jobs:
  test:
    runs-on: ubuntu-latest # Github provide contianers
    steps:
    # Step 1: Check out the code from the repository 
      - uses: actions/checkout@v2
      - name: Check Out code
      # Stop 2: Setting up the python enviroment
        uses: actions/setup-python@v2 # <--- provided by github
        with:
          python-version: 3.12
        
      # Step 3: Install Dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Setp 4: Run Tests
      - name: Run Tests
        run: pytest
